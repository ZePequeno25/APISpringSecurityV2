name: Java CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build, Test and Integrity Check
    runs-on: ubuntu-latest
    env:
      JAVA_VERSION: '17'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: m2

      - name: Ensure Maven wrapper is executable
        run: chmod +x ./mvnw

      - name: Compile project
        run: ./mvnw -B clean test-compile

      - name: Run tests
        run: ./mvnw -B test

      - name: Run project integrity check
        working-directory: ${{ github.workspace }}
        run: |
          pwsh -NoProfile -NonInteractive -Command "./project-integrity-check.ps1 -ReportPath integrity-report.md"

      - name: Upload integrity report
        uses: actions/upload-artifact@v4
        with:
          name: integrity-report
          path: integrity-report.md
