# === Banco de Dados para Testes ===
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# === RabbitMQ - Desabilitar no teste ===
spring.rabbitmq.listener.simple.auto-startup=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

# === Configurações do Broker ===
broker.queue.email.name=test.email.queue
broker.exchange.name=test.exchange
broker.routing.key=test.routing.key

# Caso tenha mais propriedades no UserProducer ou outros producers